name: Deploy to Cafe24

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 카페24 서버에 배포 (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: sang0153.cafe24.com
          username: sang0153
          password: ${{ secrets.CAFE24_PASSWORD }}
          server-dir: /www/
          exclude: |
            **/.git*
            **/.git*/**
            **/.claude/**
            **/node_modules/**
